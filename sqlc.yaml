version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/queries/sql"
    gen:
      go:
        package: "queries"
        out: "internal/queries"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type: "github.com/google/uuid.NullUUID"
