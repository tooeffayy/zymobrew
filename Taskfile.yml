version: "3"

env:
  DATABASE_URL: postgres://zymo:zymo@localhost:5433/zymo?sslmode=disable
  TEST_DATABASE_URL: postgres://zymo:zymo@localhost:5433/zymo?sslmode=disable

tasks:
  default:
    cmds:
      - task --list
    silent: true

  db:up:
    desc: Start the postgres container
    cmds:
      - docker compose up -d postgres

  db:down:
    desc: Stop the postgres container (data preserved)
    cmds:
      - docker compose stop postgres

  db:reset:
    desc: Destroy and recreate the postgres volume
    prompt: This will wipe all local Postgres data. Continue?
    cmds:
      - docker compose down -v postgres
      - docker compose up -d postgres

  db:psql:
    desc: Open a psql shell on the dev database
    interactive: true
    cmds:
      - docker compose exec postgres psql -U zymo -d zymo

  migrate:
    desc: Apply pending migrations
    deps: [ db:up ]
    cmds:
      - go run ./cmd/zymo migrate

  sqlc:
    desc: Regenerate sqlc query code
    cmds:
      - $(go env GOPATH)/bin/sqlc generate
    sources:
      - internal/queries/sql/*.sql
    generates:
      - internal/queries/*.go

  serve:
    desc: Run the API server (auto-migrates)
    deps:
      - sqlc
      - db:up
    cmds:
      - go run ./cmd/zymo serve

  selftest:
    desc: Run runtime smoke tests against the configured DB
    deps: [ db:up ]
    cmds:
      - go run ./cmd/zymo selftest

  vapid-keys:
    desc: Print a fresh VAPID keypair
    cmds:
      - go run ./cmd/zymo vapid-keys

  version:
    desc: Print build version
    cmds:
      - go run ./cmd/zymo version

  test:
    desc: Run the Go test suite (uses TEST_DATABASE_URL)
    deps: [ db:up ]
    cmds:
      - go test ./... {{.CLI_ARGS}}

  test:short:
    desc: Run only tests that don't need the DB
    cmds:
      - go test -short ./... {{.CLI_ARGS}}

  web:install:
    desc: Install web dependencies via Bun
    dir: web
    cmds:
      - bun install

  web:dev:
    desc: Start the Vite dev server
    dir: web
    deps:
      - web:build
    cmds:
      - bun run dev

  web:build:
    desc: Build the web frontend into web/dist
    dir: web
    cmds:
      - bun run build
    sources:
      - src/**/*.tsx
      - src/**/*.ts
      - src/styles.css
    generates:
      - dist/assets/*.js
      - dist/assets/*.css

  build:
    desc: Build the full zymo binary with embedded frontend
    deps:
      - sqlc
      - web:build
    cmds:
      - go build -o bin/zymo ./cmd/zymo

  docker:build:
    desc: Build the production zymo Docker image (alpine + postgresql-client)
    cmds:
      - docker build -t zymo:dev .

  docker:smoke:
    # Full image smoke: binary boots, pg_dump on PATH, runs as nonroot, TLS
    # roots present, then `zymo selftest` against the dev postgres exercises
    # connect/ping/migrations/schema/CRUD-roundtrip + storage probe end to end.
    # STORAGE_LOCAL_PATH points at /tmp/zymo-storage so the probe can write
    # without needing a volume mount.
    desc: Full image smoke (binary, pg_dump, nonroot, TLS roots, selftest vs dev DB)
    deps:
      - docker:build
      - db:up
    cmds:
      - "echo \"==> binary version\""
      - docker run --rm zymo:dev version
      - "echo \"==> pg_dump on PATH\""
      - docker run --rm --entrypoint pg_dump zymo:dev --version
      - "echo \"==> runs as nonroot (uid:gid 65532)\""
      - docker run --rm --entrypoint id zymo:dev
      - "echo \"==> ca-certificates bundle present\""
      - docker run --rm --entrypoint sh zymo:dev -c 'test -s
        /etc/ssl/certs/ca-certificates.crt && echo ok'
      - "echo \"==> selftest against dev postgres\""
      - docker run --rm --add-host=host.docker.internal:host-gateway -e
        DATABASE_URL=postgres://zymo:zymo@host.docker.internal:5433/zymo?sslmode=disable
        -e STORAGE_LOCAL_PATH=/tmp/zymo-storage zymo:dev selftest

  docker:run:
    # host.docker.internal works on Docker Desktop (Mac/Win) out of the box and
    # via --add-host=...:host-gateway on Linux; pointed at the dev compose
    # postgres on its host-side port 5433.
    desc: Run the built image against the local dev postgres
    deps:
      - docker:build
      - db:up
    cmds:
      - docker run --rm -it --name zymo-dev
        --add-host=host.docker.internal:host-gateway -e
        DATABASE_URL=postgres://zymo:zymo@host.docker.internal:5433/zymo?sslmode=disable
        -e LISTEN_ADDR=:8080 -p 8080:8080 zymo:dev

  docker:clean:
    desc: Remove the local zymo:dev image
    cmds:
      - docker rmi zymo:dev || true
