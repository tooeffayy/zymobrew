# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zymo
          POSTGRES_PASSWORD: zymo
          POSTGRES_DB: zymo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zymo -d zymo" --health-interval 5s
          --health-timeout 5s --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://zymo:zymo@localhost:5432/zymo?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install frontend deps
        working-directory: web
        run: bun install

      - name: Build frontend
        working-directory: web
        run: bun run build

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.7"

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1

      - name: Verify sqlc generated code is up to date
        run: sqlc diff

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -v ./...

      - name: Build
        run: go build -v ./...
