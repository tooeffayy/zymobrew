openapi: 3.1.0
info:
  title: Zymo API
  version: "1"
  description: Self-hostable fermentation tracking API. All unauthorized access returns 404, not 403, to avoid leaking resource existence.
  license:
    name: AGPL-3.0-only
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: /
    description: This instance

tags:
  - name: system
    description: Health and readiness probes
  - name: docs
    description: API documentation
  - name: auth
    description: Registration, login, logout, current user
  - name: users
    description: Public profiles and account settings
  - name: recipes
    description: Recipe CRUD, revisions, forking, comments, likes, reminder templates
  - name: batches
    description: Batch CRUD, readings, events, tasting notes, reminders
  - name: notifications
    description: In-app notification inbox and preferences
  - name: push
    description: Web Push (VAPID) subscription management
  - name: exports
    description: User data export
  - name: admin
    description: Admin-only database backups
  - name: calculators
    description: Stateless brewing calculators (ABV, predicted FG, honey weight, pitch rate)

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: zymo_session
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    CursorParam:
      name: cursor
      in: query
      description: |
        Opaque pagination cursor returned as `next_cursor` from a prior page.
        Omit (or pass empty) to fetch the first page. Format is intentionally
        not part of the API contract — clients should treat the value as opaque.
      required: false
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      description: Page size (1–100). Defaults to 50.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UUID:
      type: string
      format: uuid

    DateTime:
      type: string
      format: date-time

    PublicUser:
      type: object
      required: [id, username, email]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        username:
          type: string
        email:
          type: string
        display_name:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: Opaque session token. Also sent as Set-Cookie.
        user:
          $ref: '#/components/schemas/PublicUser'

    PublicProfile:
      type: object
      required: [id, username, created_at]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        username:
          type: string
        display_name:
          type: string
        bio:
          type: string
        avatar_url:
          type: string
        created_at:
          $ref: '#/components/schemas/DateTime'

    Ingredient:
      type: object
      required: [id, kind, name, sort_order, details]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        kind:
          type: string
          enum: [honey, water, yeast, nutrient, fruit, spice, oak, acid, tannin, other, juice, sugar]
        name:
          type: string
        amount:
          type: number
        unit:
          type: string
        sort_order:
          type: integer
        details:
          type: object

    IngredientInput:
      type: object
      required: [kind, name]
      properties:
        kind:
          type: string
          enum: [honey, water, yeast, nutrient, fruit, spice, oak, acid, tannin, other, juice, sugar]
        name:
          type: string
          maxLength: 200
        amount:
          type: number
        unit:
          type: string
        sort_order:
          type: integer
          default: 0
        details:
          type: object

    Recipe:
      type: object
      required: [id, author_id, revision_number, revision_count, fork_count, brew_type, name, visibility, ingredients, created_at, updated_at]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        author_id:
          $ref: '#/components/schemas/UUID'
        parent_id:
          $ref: '#/components/schemas/UUID'
        revision_number:
          type: integer
        revision_count:
          type: integer
        fork_count:
          type: integer
        brew_type:
          type: string
          enum: [mead, beer, cider, wine, kombucha]
        style:
          type: string
          maxLength: 100
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 10240
        target_og:
          type: number
        target_fg:
          type: number
        target_abv:
          type: number
        batch_size_l:
          type: number
        visibility:
          type: string
          enum: [public, unlisted, private]
        message:
          type: string
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          $ref: '#/components/schemas/DateTime'

    RecipeListItem:
      type: object
      required: [id, author_id, revision_count, fork_count, brew_type, name, visibility, updated_at]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        author_id:
          $ref: '#/components/schemas/UUID'
        parent_id:
          $ref: '#/components/schemas/UUID'
        revision_count:
          type: integer
        fork_count:
          type: integer
        brew_type:
          type: string
          enum: [mead, beer, cider, wine, kombucha]
        style:
          type: string
        name:
          type: string
        description:
          type: string
        target_og:
          type: number
        target_fg:
          type: number
        target_abv:
          type: number
        batch_size_l:
          type: number
        visibility:
          type: string
          enum: [public, unlisted, private]
        updated_at:
          $ref: '#/components/schemas/DateTime'

    RevisionSummary:
      type: object
      required: [id, revision_number, author_id, created_at]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        revision_number:
          type: integer
        author_id:
          $ref: '#/components/schemas/UUID'
        message:
          type: string
        created_at:
          $ref: '#/components/schemas/DateTime'

    RevisionDetail:
      type: object
      required: [id, revision_number, author_id, name, ingredients, created_at]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        revision_number:
          type: integer
        author_id:
          $ref: '#/components/schemas/UUID'
        message:
          type: string
        name:
          type: string
        style:
          type: string
        description:
          type: string
        target_og:
          type: number
        target_fg:
          type: number
        target_abv:
          type: number
        batch_size_l:
          type: number
        ingredients:
          type: array
          items:
            type: object
          description: JSONB snapshot of ingredients at revision time.
        created_at:
          $ref: '#/components/schemas/DateTime'

    Comment:
      type: object
      required: [id, recipe_id, author_id, author_username, body, created_at]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        recipe_id:
          $ref: '#/components/schemas/UUID'
        author_id:
          $ref: '#/components/schemas/UUID'
        author_username:
          type: string
        body:
          type: string
          maxLength: 10240
        created_at:
          $ref: '#/components/schemas/DateTime'

    Batch:
      type: object
      required: [id, name, brew_type, stage, visibility, created_at, updated_at]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          maxLength: 200
        brew_type:
          type: string
          enum: [mead, beer, cider, wine, kombucha]
        stage:
          type: string
          enum: [planning, primary, secondary, aging, bottled, archived]
        started_at:
          $ref: '#/components/schemas/DateTime'
        bottled_at:
          $ref: '#/components/schemas/DateTime'
        visibility:
          type: string
          enum: [public, unlisted, private]
        notes:
          type: string
          maxLength: 10240
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          $ref: '#/components/schemas/DateTime'

    Reading:
      type: object
      required: [id, batch_id, taken_at, source]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        batch_id:
          $ref: '#/components/schemas/UUID'
        taken_at:
          $ref: '#/components/schemas/DateTime'
        gravity:
          type: number
        temperature_c:
          type: number
        ph:
          type: number
        notes:
          type: string
        source:
          type: string
          default: manual

    BatchEvent:
      type: object
      required: [id, batch_id, occurred_at, kind, details]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        batch_id:
          $ref: '#/components/schemas/UUID'
        occurred_at:
          $ref: '#/components/schemas/DateTime'
        kind:
          type: string
          enum: [pitch, nutrient_addition, degas, rack, addition, stabilize, backsweeten, bottle, photo, note, other]
        title:
          type: string
        description:
          type: string
        details:
          type: object

    TastingNote:
      type: object
      required: [id, batch_id, author_id, tasted_at]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        batch_id:
          $ref: '#/components/schemas/UUID'
        author_id:
          $ref: '#/components/schemas/UUID'
        tasted_at:
          $ref: '#/components/schemas/DateTime'
        rating:
          type: integer
          minimum: 1
          maximum: 5
        aroma:
          type: string
        flavor:
          type: string
        mouthfeel:
          type: string
        finish:
          type: string
        notes:
          type: string

    Reminder:
      type: object
      required: [id, title, fire_at, status, created_at]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        batch_id:
          $ref: '#/components/schemas/UUID'
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 2048
        fire_at:
          $ref: '#/components/schemas/DateTime'
        status:
          type: string
          enum: [scheduled, fired, completed, snoozed, dismissed, cancelled]
        fired_at:
          $ref: '#/components/schemas/DateTime'
        completed_at:
          $ref: '#/components/schemas/DateTime'
        suggested_event_kind:
          type: string
        created_at:
          $ref: '#/components/schemas/DateTime'

    Notification:
      type: object
      required: [id, kind, title, created_at]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        reminder_id:
          $ref: '#/components/schemas/UUID'
        kind:
          type: string
        title:
          type: string
        body:
          type: string
        url_path:
          type: string
        read_at:
          $ref: '#/components/schemas/DateTime'
        created_at:
          $ref: '#/components/schemas/DateTime'

    NotificationPrefs:
      type: object
      required: [push_enabled, email_enabled, timezone]
      properties:
        push_enabled:
          type: boolean
        email_enabled:
          type: boolean
        quiet_hours_start:
          type: string
          pattern: '^\d{2}:\d{2}$'
          description: "HH:MM in user's timezone"
        quiet_hours_end:
          type: string
          pattern: '^\d{2}:\d{2}$'
          description: "HH:MM in user's timezone"
        timezone:
          type: string
          description: IANA timezone identifier

    ReminderTemplate:
      type: object
      required: [id, recipe_id, title, anchor, offset_minutes, sort_order]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        recipe_id:
          $ref: '#/components/schemas/UUID'
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 2048
        anchor:
          type: string
          enum: [batch_start, pitch, rack, bottle, custom_event]
          description: "`absolute` is rejected on templates; use direct batch reminders for wall-clock times."
        offset_minutes:
          type: integer
          description: Minutes to add to the anchor timestamp.
        suggested_event_kind:
          type: string
        sort_order:
          type: integer

    Export:
      type: object
      required: [id, status, format, created_at]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        status:
          type: string
          enum: [pending, running, complete, failed, expired]
        format:
          type: string
          enum: [zip, tar.gz, zstd]
          description: Archive format chosen at creation time.
        size_bytes:
          type: integer
        sha256:
          type: string
          description: Lowercase hex SHA-256 of the blob, present once status=complete.
        completed_at:
          $ref: '#/components/schemas/DateTime'
        expires_at:
          $ref: '#/components/schemas/DateTime'
        error:
          type: string
        created_at:
          $ref: '#/components/schemas/DateTime'

    ExportRequest:
      type: object
      properties:
        format:
          type: string
          enum: [zip, tar.gz, zstd]
          default: zip
          description: Archive format. Defaults to `zip` if omitted.

    AdminBackup:
      type: object
      required: [id, status, storage_backend, created_at]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        status:
          type: string
          enum: [pending, running, complete, failed, expired]
        storage_backend:
          type: string
        size_bytes:
          type: integer
        sha256:
          type: string
          description: Lowercase hex SHA-256 of the dump, present once status=complete.
        completed_at:
          $ref: '#/components/schemas/DateTime'
        error:
          type: string
        created_at:
          $ref: '#/components/schemas/DateTime'

paths:

  # --- System ------------------------------------------------------------------

  /healthz:
    get:
      tags: [system]
      operationId: healthz
      summary: Liveness probe
      responses:
        "200":
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /readyz:
    get:
      tags: [system]
      operationId: readyz
      summary: Readiness probe (requires DB ping)
      responses:
        "200":
          description: Database reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        "503":
          description: Database unreachable
          content:
            application/json:
              schema:
                type: object

  # --- Docs --------------------------------------------------------------------

  /docs:
    get:
      tags: [docs]
      operationId: getDocs
      summary: Redoc API documentation UI
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string

  /api/openapi.yaml:
    get:
      tags: [docs]
      operationId: getOpenAPISpec
      summary: OpenAPI 3.1 spec (this document)
      responses:
        "200":
          description: YAML spec
          content:
            application/yaml:
              schema:
                type: string

  # --- Auth --------------------------------------------------------------------

  /api/auth/register:
    post:
      tags: [auth]
      operationId: register
      summary: Register a new account
      description: |
        Behaviour depends on `INSTANCE_MODE`:
        - `open`: always allowed
        - `single_user`: allowed only while the user table is empty (bootstraps the admin)
        - `closed`: always forbidden
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                  pattern: '^[a-zA-Z0-9_-]{3,32}$'
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                display_name:
                  type: string
                  maxLength: 64
      responses:
        "201":
          description: Account created; session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Registration disabled by instance mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "409":
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "429":
          description: Rate limited
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Log in with username/email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier, password]
              properties:
                identifier:
                  type: string
                  description: Username or email address
                password:
                  type: string
      responses:
        "200":
          description: Authenticated; session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "429":
          description: Rate limited
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/logout:
    post:
      tags: [auth]
      operationId: logout
      summary: Revoke current session
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /api/auth/me:
    get:
      tags: [auth]
      operationId: getMe
      summary: Current authenticated user
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # --- Users -------------------------------------------------------------------

  /api/users/{username}:
    get:
      tags: [users]
      operationId: getProfile
      summary: Public profile for any user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProfile'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/users/me:
    patch:
      tags: [users]
      operationId: updateProfile
      summary: Update own profile fields (COALESCE — omitted fields unchanged)
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                  maxLength: 64
                bio:
                  type: string
                  maxLength: 2048
                avatar_url:
                  type: string
                  maxLength: 512
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProfile'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [users]
      operationId: deleteAccount
      summary: Anonymize own account (GDPR-style erasure)
      description: |
        Strips PII from the user row in place: username/email become
        derived placeholders, password and profile fields are cleared,
        and `deleted_at` is set. Sessions, push devices, notification
        prefs/notifications, and export rows + blobs are deleted.
        Recipes, comments, batches, and audit history are retained
        attached to the now-anonymized row. Refused for admin accounts —
        admin role must be handed off first. The action is logged in
        `account_deletion_requests` so a backup-restore can be
        re-anonymized via `zymo reprocess-deletions`.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "204":
          description: Account anonymized; session cookie cleared
        "400":
          description: Invalid JSON or account has no password set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Password incorrect or not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Admin accounts must hand off role before deletion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/users/me/password:
    post:
      tags: [users]
      operationId: changePassword
      summary: Change password; rotates all sessions
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password changed; new session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Current password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # --- Recipes -----------------------------------------------------------------

  /api/recipes:
    get:
      tags: [recipes]
      operationId: listRecipes
      summary: Public recipe feed (visibility=public, newest first)
      parameters:
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        "200":
          description: Recipe page. `next_cursor` is null when there are no more pages.
          content:
            application/json:
              schema:
                type: object
                required: [recipes, next_cursor]
                properties:
                  recipes:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecipeListItem'
                  next_cursor:
                    type: string
                    nullable: true
    post:
      tags: [recipes]
      operationId: createRecipe
      summary: Create a new recipe (mead, cider, or wine only in this build)
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 200
                brew_type:
                  type: string
                  enum: [mead, cider, wine]
                  default: mead
                style:
                  type: string
                  maxLength: 100
                description:
                  type: string
                  maxLength: 10240
                target_og:
                  type: number
                target_fg:
                  type: number
                target_abv:
                  type: number
                batch_size_l:
                  type: number
                visibility:
                  type: string
                  enum: [public, unlisted, private]
                  default: public
                message:
                  type: string
                  description: Revision 1 message
                ingredients:
                  type: array
                  maxItems: 50
                  items:
                    $ref: '#/components/schemas/IngredientInput'
      responses:
        "201":
          description: Recipe created with revision 1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/recipes/mine:
    get:
      tags: [recipes]
      operationId: listMyRecipes
      summary: All recipes for the authenticated user (all visibilities)
      security:
        - cookieAuth: []
