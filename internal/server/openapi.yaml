                  type: string
                  maxLength: 10240
                visibility:
                  type: string
                  enum: [public, unlisted, private]
                  default: public
                recipe_id:
                  $ref: '#/components/schemas/UUID'
                  description: |
                    Optional. Pins the batch to the recipe's current revision.
